申し訳ありません！レイアウトを整えようとして、意図せず縦並びにしてしまいましたね。
ご希望通り、「時刻を横一行（XX:XX → XX:XX）に表示する」形に戻しつつ、路線の色分けを維持した修正版です。

このコードを index.html に上書きしてください。

修正後の index.html（横並び復活版）
HTML
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帰宅ナビ</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; padding: 10px; color: #333; margin: 0; }
        h2 { font-size: 18px; margin: 15px 0 15px 5px; font-weight: bold; }
        
        #result { display: flex; flex-direction: column; gap: 12px; }

        /* カード基本設定 */
        .card { 
            background: white; 
            border-radius: 12px; 
            padding: 15px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); 
            border-left: 8px solid #ccc; 
        }

        /* ★路線別の色設定★ */
        .card.yamanote { border-left-color: #9acd32; background-color: #f9fff0; } /* 薄い緑背景 */
        .card.keihintohoku { border-left-color: #00bfff; background-color: #f0faff; } /* 薄い青背景 */

        /* 品川→有楽町（横一行レイアウト） */
        .route-main { 
            display: flex; 
            align-items: center; 
            justify-content: flex-start; 
            gap: 12px;
            margin-bottom: 12px; 
        }
        
        .line-tag { 
            padding: 2px 8px; 
            border-radius: 4px; 
            font-size: 11px; 
            font-weight: bold; 
            background: #333;
            color: white;
            white-space: nowrap;
        }

        .time-row { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            font-size: 19px; 
            font-weight: bold; 
        }
        
        .station-name { font-size: 12px; color: #666; font-weight: normal; margin-right: 2px; }
        .arrow { color: #bbb; font-weight: normal; }

        /* 武蔵野線エリア */
        .musashino-section { display: flex; gap: 10px; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 10px; }
        .musashino-box { flex: 1; background: white; border-radius: 8px; padding: 8px; border: 1px solid #eee; text-align: center; }
        .wait-label { font-size: 11px; color: #666; display: block; margin-bottom: 2px; }
        .musashino-time { font-size: 17px; font-weight: bold; color: #007bff; }
        .dest-label { font-size: 11px; color: #666; }

        .info-msg { text-align: center; color: #888; margin-top: 30px; }
    </style>
</head>
<body>

<h2>帰宅経路案内</h2>
<div id="result">読み込み中...</div>

<script>
async function loadCSV(file) {
    try {
        const response = await fetch(file);
        const text = await response.text();
        return text.trim().split('\n').slice(1).map(row => row.split(','));
    } catch (e) { return []; }
}

function timeToMin(timeStr) {
    if(!timeStr) return 0;
    const [h, m] = timeStr.split(':').map(Number);
    return h * 60 + m;
}

async function init() {
    const sData = await loadCSV('shinagawa_yurakucho.csv');
    const tData = await loadCSV('tokyo_musashino.csv');
    
    const now = new Date();
    const nowMin = now.getHours() * 60 + now.getMinutes();

    const nextS = sData.filter(r => timeToMin(r[1]) >= nowMin).slice(0, 3);

    let html = '';
    nextS.forEach(sRow => {
        const [lineName, sDep, yArr] = sRow;
        const yArrMin = timeToMin(yArr);
        const nextT = tData.filter(r => timeToMin(r[0]) >= yArrMin).slice(0, 2);

        // クラス判定
        let lineClass = '';
        if (lineName.includes('山手')) lineClass = 'yamanote';
        if (lineName.includes('京浜東北')) lineClass = 'keihintohoku';

        html += `
        <div class="card ${lineClass}">
            <div class="route-main">
                <span class="line-tag">${lineName}</span>
                <div class="time-row">
                    <span><small class="station-name">品川</small>${sDep}</span>
                    <span class="arrow">→</span>
                    <span><small class="station-name">有楽町</small>${yArr}</span>
                </div>
            </div>
            <div class="musashino-section">
                ${nextT.map((tRow, idx) => {
                    const wait = timeToMin(tRow[0]) - yArrMin;
                    return `
                    <div class="musashino-box">
                        <span class="wait-label">東京${idx+1} (${wait}分)</span>
                        <span class="musashino-time">${tRow[0]}</span>
                        <span class="dest-label">${tRow[1]}行</span>
                    </div>`;
                }).join('')}
            </div>
        </div>`;
    });

    document.getElementById('result').innerHTML = html || '<div class="info-msg">電車がありません</div>';
}

init();
</script>
</body>
</html>
