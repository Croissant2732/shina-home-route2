<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帰宅ナビ</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; padding: 10px; color: #333; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .route-main { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; font-size: 15px; }
        .line-tag { background: #333; color: white; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .time-display { font-weight: bold; font-size: 18px; }
        .arrow { color: #aaa; }
        .musashino-section { display: flex; gap: 10px; border-top: 1px solid #eee; pt: 10px; padding-top: 10px; }
        .musashino-box { flex: 1; background: #f8f9fa; border-radius: 8px; padding: 8px; }
        .wait-label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
        .musashino-time { font-size: 16px; font-weight: bold; color: #007bff; }
        .dest-label { font-size: 11px; color: #888; margin-left: 4px; }
        h2 { font-size: 18px; margin: 10px 0 20px 5px; }
    </style>
</head>
<body>

<h2>帰宅経路案内</h2>
<div id="result">データを読み込み中...</div>

<script>
async function loadCSV(file) {
    const response = await fetch(file);
    const text = await response.text();
    return text.trim().split('\n').slice(1).map(row => row.split(','));
}

function timeToMin(timeStr) {
    if(!timeStr) return 0;
    const [h, m] = timeStr.split(':').map(Number);
    return h * 60 + m;
}

async function init() {
    try {
        const sData = await loadCSV('shinagawa_yurakucho.csv');
        const tData = await loadCSV('tokyo_musashino.csv');
        
        const now = new Date();
        const nowMin = now.getHours() * 60 + now.getMinutes();

        // 品川発が現在時刻以降のものを3つ
        const nextS = sData.filter(r => timeToMin(r[1]) >= nowMin).slice(0, 3);

        let html = '';
        nextS.forEach(sRow => {
            const [lineName, sDep, yArr] = sRow;
            const yArrMin = timeToMin(yArr);
            
            // 有楽町着以降の武蔵野線を2本
            const nextT = tData.filter(r => timeToMin(r[0]) >= yArrMin).slice(0, 2);

            html += `<div class="card">
                <div class="route-main">
                    <span class="line-tag">${lineName}</span>
                    <span class="time-display">${sDep}</span>
                    <span class="arrow">→</span>
                    <span class="time-display">${yArr}着</span>
                </div>
                <div class="musashino-section">
                    ${nextT.map((tRow, idx) => {
                        const wait = timeToMin(tRow[0]) - yArrMin;
                        return `
                        <div class="musashino-box">
                            <span class="wait-label">東京${idx + 1} (${wait}分待ち)</span>
                            <span class="musashino-time">${tRow[0]}</span>
                            <span class="dest-label">${tRow[1]}行</span>
                        </div>`;
                    }).join('')}
                    ${nextT.length === 0 ? '<div class="musashino-box">接続なし</div>' : ''}
                </div>
            </div>`;
        });

        document.getElementById('result').innerHTML = html || '対象時間の電車がありません';
    } catch (e) {
        document.getElementById('result').innerHTML = 'CSV読み込みエラー。ファイル名を確認してください。';
    }
}

init();
</script>
</body>
</html>
